services:

  # PHP Service
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: pms-backend-app
    container_name: pms-backend-app
    restart: unless-stopped
    tty: true
    environment:
      SERVICE_NAME: app
      SERVICE_TAGS: dev
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - pms-network

  # Nginx Service
  webserver:
    image: nginx:alpine
    container_name: pms-backend-nginx
    restart: unless-stopped
    tty: true
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/conf.d/:/etc/nginx/conf.d/
    networks:
      - pms-network

  # MySQL Service
  db:
    image: mysql:8.0
    container_name: pms-backend-db
    restart: unless-stopped
    tty: true
    ports:
      - "33061:3306"
    environment:
      MYSQL_DATABASE: pharmacy
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_PASSWORD: user_password
      MYSQL_USER: pms_user
    volumes:
      - pms-dbdata:/var/lib/mysql
    networks:
      - pms-network

# Docker Networks
networks:
  pms-network:
    driver: bridge

# Volumes
volumes:
  pms-dbdata:
    driver: local
